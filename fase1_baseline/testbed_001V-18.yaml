# fase1_baseline/testbed_001V-18.yaml
# Testbed pyATS - conexion por IP, nombre generico CSR1kv
# (funciona aunque el router aun tenga su hostname de fabrica)

devices:
  CSR1kv:
    os: iosxe
    type: router
    credentials:
      default:
        username: cisco
        password: cisco123!
    connections:
      cli:
        protocol: ssh -o KexAlgorithms=diffie-hellman-group14-sha1
        ip: 192.168.56.101
        port: 22
